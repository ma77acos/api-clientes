# Application
spring.application.name=reservas-canchas
server.port=8080

spring.profiles.active=prod

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/reservas_db?useSSL=false&allowPublicKeyRetrieval=true
createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=MiClaveSecretaSuperSeguraParaJWTDebeSerMuyLargaYCompleja2024!@#$%
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Logging
# Logging detallado
logging.level.root=INFO
logging.level.com.reservas=DEBUG
logging.level.com.mercadopago=DEBUG

# Ver los requests HTTP completos
logging.level.org.apache.http=DEBUG
logging.level.org.apache.http.wire=DEBUG

# Formato de logs m·s legible
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

